# Local stack for integration testing and demos
# Usage: docker compose up -d postgres
#        data-forge generate --pack saas_billing -o output -f sql
#        psql -h localhost -U postgres -d test -f output/*.sql (example)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Redpanda for event streaming (uncomment when adding stream_simulator)
  # redpanda:
  #   image: redpandadata/redpanda:latest
  #   command: redpanda start --smp 1 --memory 1G --overprovisioned
  #   ports:
  #     - "9092:9092"
