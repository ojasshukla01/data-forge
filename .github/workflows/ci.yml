# Backend: ruff + pytest. Frontend: only when frontend/package.json is present.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          prune-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Run ruff
        run: uv run ruff check src tests

      - name: Run mypy
        run: uv run mypy src

      - name: Run pytest with coverage
        run: uv run pytest tests -v --tb=short --cov=src/data_forge --cov-report=term-missing --cov-fail-under=0

      - name: Pip audit (optional)
        run: uv run pip install pip-audit && uv run pip-audit --desc || true
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: frontend
        run: echo "exists=$([ -f frontend/package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Set up Node
        if: steps.frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npm install

      - name: Frontend type-check
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npx tsc --noEmit

      - name: Frontend lint
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npm run lint

      - name: Frontend unit tests
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npm test

      - name: Build frontend
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npm run build

      - name: NPM audit (optional)
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npm audit --audit-level=moderate || true
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          prune-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend
        run: uv sync --extra dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend & Playwright
        run: |
          cd frontend && npm install
          npx playwright install --with-deps chromium

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000

      - name: Start API
        run: uv run uvicorn data_forge.api.main:app --host 127.0.0.1 --port 8000 &
        env:
          DATA_FORGE_STORAGE_BACKEND: file

      - name: Start frontend
        run: cd frontend && npm run start &
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000

      - name: Wait for servers
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && curl -sf -o /dev/null http://127.0.0.1:3000 && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health
          curl -sf -o /dev/null http://127.0.0.1:3000
          # Ensure custom-schemas API is ready (lazy init)
          curl -sf http://127.0.0.1:8000/api/custom-schemas

      - name: Run Playwright E2E
        run: cd frontend && npm run e2e

      - name: Stop servers
        if: always()
        run: |
          pkill -f "uvicorn data_forge.api.main" || true
          pkill -f "next-server" || true
