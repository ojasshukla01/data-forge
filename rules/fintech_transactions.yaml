name: fintech_transactions
scenario: fintech_transactions
description: Business rules for fintech transactions and settlements

business_rules:
  - name: transaction_amount_positive_unless_reversal
    rule_type: range
    table: transactions
    fields: [amount_cents]
    params:
      min: -999999999
    description: Amount > 0 unless reversal
  - name: settlement_date_after_transaction
    rule_type: order
    table: transactions
    expression: transaction_date <= settlement_date
    description: settlement_date >= transaction_date where both present
  - name: account_dates_order
    rule_type: order
    table: accounts
    expression: opened_at <= closed_at
distribution_rules:
  - table: accounts
    column: account_type
    distribution: categorical
    params:
      categories: ["checking", "savings", "credit"]
      weights: [0.5, 0.3, 0.2]
  - table: transactions
    column: status
    distribution: categorical
    params:
      categories: ["completed", "pending", "reversed", "failed"]
      weights: [0.85, 0.08, 0.05, 0.02]
  - table: merchants
    column: category
    distribution: categorical
    params:
      categories: ["retail", "food", "travel", "services"]
      weights: [0.4, 0.25, 0.2, 0.15]
